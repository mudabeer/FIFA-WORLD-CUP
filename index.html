<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA WORLD CUP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <div class="hero_main">
        <div class="navbar">
            <div class="icon border">
                <img class="cup" src="cup.png">
                <div class="logo-text">
                    <p class="fifa">FIFA</p>
                    <p class="year">WORLD CUP 2026</p>
                </div>
            </div>

            <div class="navigation">
                <ul>
                    <li class="li border"><a href="#">HOME</a></li>
                    <li class="li border"><a href="#">TEAMS</a></li>
                    <li class="li border"><a href="#">MATCHES</a></li>
                    <li class="li border"><a href="#">STADIUMS</a></li>
                    <li class="li border"><a href="#">NEWS</a></li>
                    <li class="li border"><a href="#">CONTACT</a></li>
                </ul>
            </div>

            <div class="menu border">
                <img src="menu.png" class="menu_img">
            </div>
        </div>

        <div class="hero-content">

            <div class="text" >
                <h1 class="first">FIFA</h1>
                <h1 class="second">WORLD CUP</h1>
                <h1 class="third">2026</h1>
                <br>
                <p>The biggest football tournament</p>
                <p>in the world.One dream.One trophy</p>
                <br>
                <div class="button_">
                <button class="button view">EXPLORE MATCHES</button>
                <button class="button view">BUY TICKETS</button>
                </div>
            </div>

            <div class="worldcup">
                <img src="cup2.png">
            </div>

            <div class="stats">
                    <div class="stat">
                    <img src="ppl.png" class="stat_icon">

                    <div class="stat_text">
                        <h3>32</h3>
                        <p class="stat_sub">Teams</p>
                    </div>
                    </div>
                    <div class="stat">
                        <img src="calender.png" class="stat_icon">

                    <div class="stat_text">
                    <h3>64</h3>
                    <p class="stat_sub">Matchs</p>
                    </div>
                    </div>
                    <div class="stat">
                        <img src="stadium.png" class="stat_icon">

                    <div class="stat_text">
                        <h3>16</h3>
                        <p class="stat_sub">Stadiums</p>
                    </div>
                    </div>
                    <div class="stat">
                        <img src="trophy.png" class="stat_icon">

                    <div class="stat_text">
                        <h3>1</h3>
                        <p class="stat_sub">Champion</p>
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

<main>
    <section id="about">
        <div class="container">
            <!-- United by Football -->
        </div>
    </section>

    <section id="gallery">
        <div class="container">
            <!-- Gallery -->
        </div>
    </section>

</main>

<footer>
    <div class="container">
        <!-- Footer -->
    </div>
</footer>

</body>
</html>
